[reconstruction]
# Motion model used by reconstruction ("rigid" or "non-rigid").
motion_type = "rigid"
# Manual number of motion states used for reconstruction.
# This value is selected only if manual mode is selected (i.e., no motion simulation override).
N_motion_states = 4
# Apply extra scaling to motion updates during GN iterations.
use_scaled_motion_update = false
# Multi-resolution scale factors (relative to full resolution).
ResolutionLevels = [0.25, 0.5, 1.0]
# Number of GN iterations for each resolution level.
GN_iterations_per_level = [8, 3, 3]

# Stop CG when stagnation is detected.
cg_early_stopping = true
# Iteration interval for recomputing the true residual in CG.
cg_true_residual_interval = 10
# Allowed consecutive stagnating CG steps.
cg_max_stag_steps = 3
# Extra CG steps after the first stopping criterion is met.
cg_max_more_steps = 0
# Estimate regularization scaling internally from probes.
cg_use_reg_scale_proxy = true
# Number of probes for regularization scaling estimate.
cg_reg_scale_num_probes = 8

# Image reconstruction regularization weight.
lambda_r = 5.0e-2
# Maximum CG/GN inner iterations for image update.
max_iter_recon = 96
# Convergence tolerance for image update.
tol_recon = 1.0e-3

# Motion reconstruction regularization weight.
lambda_m = 1.0e-1
# Maximum CG/GN inner iterations for motion update.
max_iter_motion = 64
# Convergence tolerance for motion update.
tol_motion = 1.0e-3
