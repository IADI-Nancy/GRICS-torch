[paths]
# Folder for debug plots and intermediate diagnostics.
debug_folder = "debug_outputs/"
# Folder for optimizer logs and residual curves.
logs_folder = "logs/"
# Folder for final outputs (images, motion model).
results_folder = "results/"
# Folder for saved input data artifacts (ground truth/distorted images, motion signals, etc.).
initial_data_folder = "initial_data/"

[runtime]
# Enable debug visualizations and deterministic behavior where possible.
debug_flag = true
# Preferred compute device: "gpu" or "cpu".
runtime_device = "gpu"
# Random seed for reproducibility. Remove this line to disable seeding.
seed = 1
# Print logs.
verbose = true
# Print JointReconstructor progress to console.
print_to_console = true
# Clean debug/log/results/initial_data folders before each run.
clean_output_folders_before_run = true


[kspace_normalization]
# Normalize k-space before optimization.
normalize_kspace = true
# Normalization mode: "rms" or "max".
kspace_norm_mode = "rms"
# Lower bound to avoid division by zero during normalization.
kspace_norm_eps = 1.0e-12

[coil_sensitivity]
# Width of auto-calibration signal region for ESPIRiT.
acs = 48
# ESPIRiT kernel width.
kernel_width = 12
